name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev,mcp]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src/workloadtruth

      - name: Test + coverage
        run: pytest --cov=workloadtruth --cov-report=term-missing --cov-fail-under=80

      - name: Build sdist/wheel
        run: |
          pip install build
          python -m build

  npm-shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Sanity-check the npm launcher's not-found message
        working-directory: npm-shim
        run: |
          set +e
          output=$(node bin/workloadtruth-cli.js --help 2>&1)
          status=$?
          set -e
          echo "$output"
          test "$status" -ne 0
          echo "$output" | grep -q "was not found on your PATH"
